<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" value="0" readonly>
        <div class="buttons">
            <button class="function" id="btnClear" colspan="2">C</button>
            <button class="function" id="btnPlusMinus">+/-</button>
            <button class="operator" data-op="/">/</button>
            <button class="scientific" id="btnSqrt">√</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator" data-op="*">*</button>
            <button class="scientific" id="btnSquare">x²</button>

            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator" data-op="-">-</button>
            <button class="scientific" id="btnSin">sin</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator" data-op="+">+</button>
            <button class="scientific" id="btnCos">cos</button>

            <button class="number">0</button>
            <button class="number">.</button>
            <button class="operator equals" id="btnEquals">=</button>
            <button class="scientific" id="btnTan">tan</button>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>
</html>
